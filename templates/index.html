<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Translator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #4a90e2; }
        
        /* Tabs */
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-size: 16px; font-weight: bold; color: #666; }
        .tab-btn.active { color: #4a90e2; border-bottom: 3px solid #4a90e2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Forms */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        select, input[type="file"], textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
        textarea { height: 150px; resize: vertical; }
        
        button.submit-btn { width: 100%; padding: 12px; background-color: #4a90e2; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button.submit-btn:hover { background-color: #357abd; }

        .result-box { margin-top: 20px; padding: 15px; background: #eef; border-radius: 5px; border: 1px solid #ccd; }
        #result-display {
            min-height: 50px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 Python Translator</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('text')">Text Translator</button>
        <button class="tab-btn" onclick="openTab('file')">File Translator</button>
    </div>

    <!-- Text Translation Tab -->
    <div id="text" class="tab-content active">
    <div class="form-group">
        <label>Source Language</label>
        <select id="src_lang" name="src_lang">
            {% for lang in languages %}
            <option value="{{ lang }}" {% if lang == selected_src %}selected{% endif %}>{{ lang }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Destination Language</label>
        <select id="dest_lang" name="dest_lang">
            {% for lang in languages %}
            <option value="{{ lang }}" {% if lang == selected_dest %}selected{% endif %}>{{ lang }}</option>
            {% endfor %}
        </select>
    </div>,
    <div class="form-group">
        <label>Enter Text</label>
        <textarea id="text-input" name="text" placeholder="Type something here...">{{ original_text }}</textarea>
    </div>

    <div class="result-box">
        <h3>Result:</h3>
        <div class="result-container">
            <div id="result-display" class="border p-3 bg-light">{{ translated_text }}</div>
            
            <div class="mt-2">
                <button id="copy-btn" class="btn btn-secondary btn-sm">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button id="tts-btn" class="btn btn-info btn-sm">
                    <i class="fas fa-volume-up"></i> Listen
                </button>
            </div>
        </div>
    </div>
</div>

    <!-- File Translation Tab -->
    <div id="file" class="tab-content">
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Upload File (.txt, .pdf, .docx)</label>
                <input type="file" name="file" required>
            </div>
            <div class="form-group">
                <label>Source Language</label>
                <select name="src_lang">
                    {% for lang in languages %}
                    <option value="{{ lang }}">{{ lang }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Destination Language</label>
                <select name="dest_lang">
                    {% for lang in languages %}
                    <option value="{{ lang }}" {% if lang == 'Hindi' %}selected{% endif %}>{{ lang }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="submit-btn">Upload & Translate</button>
        </form>
    </div>
</div>

<script>
    function openTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
    }

    
</script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script>
        // Force WebSocket transport and point to the correct URL
        const socket = io({
            transports: ['websocket'],
            upgrade: false
        });

        const inputArea = document.getElementById('text-input');
        const outputArea = document.getElementById('result-display');
        const srcLang = document.getElementById('src_lang');
        const destLang = document.getElementById('dest_lang');

        socket.on('connect', () => {
            // console.log("Connected to Render WebSocket!");
        });

        // Ensure your event name matches your app.py (@socketio.on('realtime_translation'))
        inputArea.addEventListener('input', () => {
            // console.log("Typing detected: " + inputArea.value); // Add this!
            socket.emit('realtime_translation', {
                text: inputArea.value,
                src_lang: document.getElementById('src_lang').value,
                dest_lang: document.getElementById('dest_lang').value
            });
        });

        socket.on('update_result', (data) => {
            // console.log("Server sent back:", data); // Add this!
            document.getElementById('result-display').innerText = data.translated_text;
        });

        // --- 1. Copy to Clipboard Logic ---
        const copyBtn = document.getElementById('copy-btn');
        copyBtn.addEventListener('click', () => {
            const textToCopy = document.getElementById('result-display').innerText;
            
            if (textToCopy && textToCopy !== "Result will appear here...") {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = "✅ Copied!";
                    setTimeout(() => { copyBtn.innerHTML = originalText; }, 2000);
                });
            }
        });

        // --- 2. Voice Synthesis (TTS) Logic ---
        const ttsBtn = document.getElementById('tts-btn');
        ttsBtn.addEventListener('click', () => {
            const textToSpeak = document.getElementById('result-display').innerText;
            const destLang = document.getElementById('dest_lang').value; // e.g., 'hi' or 'te'

            if (textToSpeak && textToSpeak !== "Result will appear here...") {
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                
                // This helps the browser pick the right accent/voice
                utterance.lang = destLang; 
                
                window.speechSynthesis.speak(utterance);
            }
        });
    </script>
    
</body>
</html>
